description = "Switch on Budzie mode and set compression intensity"
prompt = "Use Budzie mode. Before coding: can this be skipped, solved by stdlib/native platform, or reduced to one line? Prefer no new deps. Track intentional shortcuts with `budzie:` comments naming ceiling and upgrade trigger. Keep savings measurable. Compression intensity: if `{{args}}` names a level (low|medium|xhigh|ultra), persist it with `node scripts/intensity.mjs set {{args}}`; with no level, read the current one with `node scripts/intensity.mjs get` (default medium). Apply that level's reduction band per skills/budzie/SKILL.md. The auto-clarity guard always overrides the level: write full prose for destructive or security actions and conditional multi-step sequences, then resume."
