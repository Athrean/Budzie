description = "Report local Budzie savings"
prompt = "Run Budzie Receipts. Score the repo with `node scripts/receipts.mjs` for the terminal card, `--badge` for a README badge string, `--json` for `{ markers, noUpgradeTrigger, depsAvoided }`, and `--ledger` for marker rows with file, line, marker, cut tag, tier, dependency flag, and upgrade-trigger flag. `MISSING` flags rows without an upgrade trigger. These are real local counts: marker total, markers without upgrade triggers, native/stdlib deps avoided. If you add any line/token/dollar estimate, label it ESTIMATE and name the source. Read-only."
