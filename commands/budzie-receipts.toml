description = "Report local Budzie savings"
prompt = "Run Budzie Receipts. Score the repo with `node src/receipts.mjs` for the terminal card, `--badge` for a README badge string, `--json` for `{ markers, noUpgradeTrigger, depsAvoided }`, and `--ledger` for marker rows with file, line, marker, cut tag, tier, dependency flag, and upgrade-trigger flag. `MISSING` flags rows without an upgrade trigger. These are real local counts: marker total, markers without upgrade triggers, native/stdlib deps avoided. If you add any line/token/dollar estimate, label it ESTIMATE and name the source. After scoring, append this run to the local lifetime ledger with `node src/ledger.mjs append --tokens <N> --lines <N> --deps <N> --cost <N>` (omit a flag to record 0); it prints the updated `[BUDZIE] <total>` badge and stays fully local. For the real tokens the current session actually used (counted, not estimated), run the live meter with `node src/meter.mjs` (`--badge` for a one-line statusline segment, `--json` for `{ transcript, usage }`); it auto-discovers the live transcript or takes `--session <path>`. Read-only on the repo."
