description = "Report local Budzie savings"
prompt = "Run Budzie Receipts. Score the repo with `node scripts/receipts.mjs` for the terminal card, `--badge` for a README badge string, and `--json` for `{ markers, noUpgradeTrigger, depsAvoided }`. These are real local counts: marker total, markers without upgrade triggers, native/stdlib deps avoided. If you add any line/token/dollar estimate, label it ESTIMATE and name the source. Read-only."
