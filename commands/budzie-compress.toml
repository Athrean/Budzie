description = "Compress an agent memory file in place with a .bak backup"
prompt = "Run Budzie Compress with args: {{args}}. Use `node scripts/compress.mjs <file>` to rewrite a natural-language agent memory file in place with a `<file>.bak` backup, or `node scripts/compress.mjs --dry-run <file>` to print before/after ESTIMATE token counts without writing. The compressor uses the current Budzie intensity level from `scripts/intensity.mjs` (low|medium|xhigh|ultra). It preserves byte-for-byte: fenced code blocks, inline code, URLs, paths, API names, identifiers, and exact error strings. Refuse sensitive or non-context files. Local-only. No telemetry. No network."
