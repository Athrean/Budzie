description = "Compress an agent memory file in place with a .bak backup"
prompt = "Run Budzie Compress with args: {{args}}. Use `node src/compress.mjs <file>` to rewrite a natural-language agent memory file in place with a `<file>.bak` backup, or `node src/compress.mjs --dry-run <file>` to print before/after ESTIMATE token counts without writing. The compressor uses the current Budzie intensity level from `src/intensity.mjs` (low|medium|xhigh|ultra). Keep prose in the same language as the input; never translate it or prepend an English status phrase. Preserve byte-for-byte: fenced code blocks, inline code, CLI commands, URLs, paths, API names, identifiers, and exact error strings. Refuse sensitive or non-context files. Local-only. No telemetry. No network."
