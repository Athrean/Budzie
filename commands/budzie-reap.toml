description = "Audit, cut, verify, and report deleted bloat"
prompt = "Run Budzie Reaper. Build the ranked cut plan with `node src/reap.mjs plan`; use `node src/reap.mjs plan --aggressive` only when the user asks for native/yagni cuts. Apply one cut per worktree, run detected tests, keep green cuts, discard red cuts, then render the PR receipt with `node src/reap.mjs receipt` from `{ kept, discarded, linesRemoved, depsRemoved }`. Never auto-merge."
