description = "Audit bloat, summarize safe cuts, and apply only after approval"
prompt = "Run Budzie Reaper in audit-only mode first. Build the ranked cut plan with `node src/reap.mjs plan`; use `node src/reap.mjs plan --aggressive` only when the user asks for native/yagni cuts. Present a compact ranked summary with evidence, risk, expected savings, and verification command. State that no files changed, ask whether to apply the safe cuts, and stop. Do not create worktrees or edit files until the user explicitly approves after seeing the summary. After approval, apply one approved cut per worktree, run detected tests, keep green cuts, discard red cuts, then render the PR receipt with `node src/reap.mjs receipt` from `{ kept, discarded, linesRemoved, depsRemoved }`. Never auto-merge."
