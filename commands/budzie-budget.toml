description = "Configure and check Budzie spend ceiling"
prompt = "Run Budzie budget guard with args: {{args}}. Use `node src/budget.mjs status` for read-only status. Use `node src/budget.mjs set --ceiling <n> --unit <unit> [--warn-at <ratio>] [--mode warn|stop]` to write `.budzie/budget.json`. Use `node src/budget.mjs check [--estimate <n>] [--session <path>]` for a read-only check; `--session` feeds a LOCAL session log's total token usage into the same warn/stop check. Use `node src/session.mjs report --session <path> [--estimate] [--json]` for a local session usage receipt (real counted turns and token fields first; `--estimate` adds a labelled `ESTIMATE (session log)` fallback). Environment overrides: `BUDZIE_BUDGET_CEILING`, `BUDZIE_BUDGET_UNIT`, `BUDZIE_BUDGET_WARN_AT`, `BUDZIE_BUDGET_MODE`. If estimate or usage input is missing, report `estimated: unknown`; never invent a number. No telemetry. No network."
