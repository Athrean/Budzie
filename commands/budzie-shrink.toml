description = "Shrink prose-heavy MCP tool descriptions, preserving protocol behavior"
prompt = "Run Budzie Shrink with args: {{args}}. Start the standalone MCP stdio middleware with `budzie-shrink --upstream \"<command>\"`. It forwards all MCP traffic, compresses only top-level tool `description` strings in successful `tools/list` responses, and uses the current Budzie intensity. Preserve tool names, titles, schemas, parameter types, enum values, annotations, cursors, request IDs, errors, and tool results. Keep stdout protocol-only. Write the first catalog's real UTF-8 before/after byte counts and savings ratio to stderr. The upstream command runs through the local shell, so wrap trusted commands only. For read-only inspection of a saved catalog, use `node src/tool-reducer.mjs --fields description catalog.json`. Budzie adds no network calls or telemetry."
