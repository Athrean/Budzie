description = "Shrink prose-heavy MCP tool descriptions, preserving protocol behavior"
prompt = "Run Budzie Shrink with args: {{args}}. Opt-in tool-catalog size reducer over a `tools/list`-style result. Use `node scripts/tool-reducer.mjs --fields description catalog.json` for the savings card, `--json` for `{ catalog, bytesBefore, bytesAfter }`, or pipe the catalog on stdin. `--fields` is a comma-separated list of top-level tool fields to compress; with no `--fields` the catalog passes through unchanged. Compress only configured prose fields and never grow a field. Preserve byte-for-byte: tool names, param names, enum values, URLs, file paths, backtick code spans, and JSON structure. Report real before/after UTF-8 byte counts. Read-only. No telemetry."
